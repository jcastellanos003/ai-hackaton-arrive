version: "3.9"

services:
  # ── Backend (Spring Boot) ──────────────────────────────────────────────────
  backend:
    build:
      context: ./be
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # H2 in-memory is the default — no external DB needed for the demo.
      # To switch to PostgreSQL, override these and add a 'db' service below.
      SERVER_PORT: 8080
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || wget -qO- http://localhost:8080/v1/products || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./fe/e-commerce
      dockerfile: Dockerfile
      args:
        # Must be the URL the *browser* can reach — not container-internal.
        NEXT_PUBLIC_API_URL: http://localhost:8080/v1
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

